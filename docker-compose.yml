# ============================================
# Docker Compose for အမောပြေ (Ah-Maw-Pyay)
# Water Delivery & Factory Management App
# ============================================
# Usage:
#   docker-compose up -d          (start all services)
#   docker-compose down           (stop all services)
#   docker-compose logs -f app    (view app logs)
#   docker-compose logs -f db     (view database logs)
# ============================================

version: "3.8"

services:
  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: amaw_pyay_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-StrongRootPassword123!}
      MYSQL_DATABASE: ${DB_NAME:-amaw_pyay}
      MYSQL_USER: ${DB_USER:-amaw_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-AmawPyay2024!}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-StrongRootPassword123!}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  # ---- Node.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amaw_pyay_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-amaw_user}:${DB_PASSWORD:-AmawPyay2024!}@db:3306/${DB_NAME:-amaw_pyay}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-this-in-production}
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      OWNER_NAME: ${OWNER_NAME:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # ---- Nginx Reverse Proxy (Optional - for SSL/domain) ----
  nginx:
    image: nginx:alpine
    container_name: amaw_pyay_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - app_network

volumes:
  mysql_data:
    driver: local

networks:
  app_network:
    driver: bridge
