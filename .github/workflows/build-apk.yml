name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Install pnpm globally
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install
    
    - name: Build web assets
      run: pnpm run build
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Create Cordova project
      run: |
        cd /tmp
        cordova create amaw_app com.amawpyay.waterdash "အမောပြေ"
        cd amaw_app
        cordova platform add android@14
    
    - name: Copy web assets
      run: |
        rm -rf /tmp/amaw_app/www
        cp -r ${{ github.workspace }}/dist /tmp/amaw_app/www
    
    - name: Build APK
      run: |
        cd /tmp/amaw_app
        cordova build android --debug
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: amaw-pyay-apk
        path: /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        body: |
          Automated APK build from commit ${{ github.sha }}
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Run: ${{ github.run_number }}
          
          **Installation:**
          1. Download the APK file below
          2. Enable "Unknown sources" in Android settings
          3. Install the APK on your Android device
          4. Launch the app and test the login flow
          
          **Features:**
          - Cloud backend integration (https://waterdash-95vzqj2j.manus.space)
          - Offline support with Service Worker
          - PWA capabilities
          - Bilingual UI (Myanmar/English)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
