name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Install pnpm globally
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install
    
    - name: Build web assets
      run: |
        export VITE_API_URL="https://api.sonesaye.com"
        pnpm run build
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Create Cordova project
      run: |
        cd /tmp
        cordova create amaw_app com.amawpyay.waterdash "အမောပြေ"
        cd amaw_app
        cordova platform add android@14
    
    - name: Copy web assets
      run: |
        rm -rf /tmp/amaw_app/www/*
        cp -r ${{ github.workspace }}/dist/* /tmp/amaw_app/www/
        
        # Verify files
        echo "=== Files copied ==="
        ls -la /tmp/amaw_app/www/ | head -20
        
        # Check index.html
        if [ -f /tmp/amaw_app/www/index.html ]; then
          echo "✅ index.html found"
          wc -l /tmp/amaw_app/www/index.html
        else
          echo "❌ index.html NOT found"
          exit 1
        fi
    
    - name: Update config.xml
      run: |
        cat > /tmp/amaw_app/config.xml << 'XMLEOF'
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.amawpyay.waterdash" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
          <name>အမောပြေ</name>
          <description>Pure Water Delivery Service</description>
          <author email="admin@sonesaye.com" href="https://sonesaye.com">Ahmaw Pyay</author>
          <content src="index.html" />
          
          <!-- Plugins -->
          <plugin name="cordova-plugin-whitelist" spec="1" />
          
          <!-- Access policies -->
          <access origin="*" />
          <allow-navigation href="*" />
          <allow-intent href="http://*/*" />
          <allow-intent href="https://*/*" />
          <allow-intent href="tel:*" />
          <allow-intent href="sms:*" />
          <allow-intent href="mailto:*" />
          <allow-intent href="geo:*" />
          
          <!-- Android platform specific -->
          <platform name="android">
            <allow-intent href="market:*" />
            
            <!-- Preferences -->
            <preference name="loglevel" value="error" />
            <preference name="orientation" value="portrait" />
            <preference name="Fullscreen" value="false" />
            <preference name="ShowTitle" value="true" />
            
            <!-- Allow HTTPS connections -->
            <preference name="GradlePluginGoogleServicesEnabled" value="false" />
            <preference name="AndroidInsecureFilesAllowed" value="true" />
          </platform>
        </widget>
        XMLEOF
    
    - name: Build APK
      run: |
        cd /tmp/amaw_app
        cordova build android --debug 2>&1 | tail -150
    
    - name: Verify APK was created
      run: |
        echo "=== Checking for APK files ==="
        find /tmp/amaw_app/platforms/android -name "*.apk" -type f
        ls -lh /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: amaw-pyay-apk
        path: /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        body: |
          Automated APK build from commit ${{ github.sha }}
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Run: ${{ github.run_number }}
          
          **Installation:**
          1. Download the APK file below
          2. Enable "Unknown sources" in Android settings
          3. Install the APK on your Android device
          4. Launch the app
          
          **Features:**
          - Cloud backend integration (https://api.sonesaye.com)
          - Offline support with Service Worker
          - PWA capabilities
          - Bilingual UI (Myanmar/English)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
