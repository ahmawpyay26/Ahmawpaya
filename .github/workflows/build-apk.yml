name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Build web assets
      run: pnpm run build
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Create Cordova project
      run: |
        cd /tmp
        cordova create amaw_app com.amawpyay.waterdash "အမောပြေ"
        cd amaw_app
        cordova platform add android@14
    
    - name: Copy web assets
      run: |
        rm -rf /tmp/amaw_app/www
        cp -r ${{ github.workspace }}/dist /tmp/amaw_app/www
    
    - name: Build APK
      run: |
        cd /tmp/amaw_app
        cordova build android --debug
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: amaw-pyay-apk
        path: /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/amaw_app/platforms/android/app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
