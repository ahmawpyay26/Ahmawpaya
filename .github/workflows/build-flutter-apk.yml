name: Build Flutter Release APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build-apk:
    name: Build Flutter Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Android SDK platforms
        run: |
          echo "Installing Android SDK 35 and build-tools..."
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER=$(find $ANDROID_SDK_ROOT/cmdline-tools -name sdkmanager -type f 2>/dev/null | head -1)
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -f "$SDKMANAGER" ]; then
            echo "Warning: sdkmanager not found, skipping SDK installation"
            echo "Android SDK packages should already be installed by flutter-action"
          else
            echo "Using sdkmanager: $SDKMANAGER"
            yes | "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -10 || true
          fi
          echo "Verifying Android SDK 35 installation..."
          ls -la $ANDROID_SDK_ROOT/platforms/android-35/android.jar 2>/dev/null || echo "Warning: android.jar not found"
        env:
          ANDROID_SDK_ROOT: /opt/hostedtoolcache/android/sdk

      - name: Get Flutter dependencies
        run: |
          cd mobile_flutter
          flutter pub get

      - name: Run Flutter analyze
        continue-on-error: true
        run: |
          cd mobile_flutter
          flutter analyze

      - name: Build APK (Release)
        run: |
          cd mobile_flutter
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --verbose
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

      - name: Generate APK checksum
        run: |
          APK_PATH="mobile_flutter/build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
            APK_CHECKSUM=$(sha256sum "$APK_PATH" | awk '{print $1}')
            echo "APK_CHECKSUM=$APK_CHECKSUM" >> $GITHUB_ENV
            echo "=== APK Build Successful ===" >> $GITHUB_STEP_SUMMARY
            echo "APK Path: $APK_PATH" >> $GITHUB_STEP_SUMMARY
            echo "APK Size: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "SHA256: $APK_CHECKSUM" >> $GITHUB_STEP_SUMMARY
          else
            echo "ERROR: APK not found at $APK_PATH"
            exit 1
          fi

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-release-apk
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display build summary
        if: always()
        run: |
          echo "=== Build Summary ===" 
          echo "Status: ${{ job.status }}"
          echo "APK Path: ${{ env.APK_PATH }}"
          echo "APK Size: ${{ env.APK_SIZE }}"
          echo "SHA256: ${{ env.APK_CHECKSUM }}"
