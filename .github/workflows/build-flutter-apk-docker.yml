name: Build Flutter Release APK (Docker)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'mobile_flutter/**'
      - '.github/workflows/build-flutter-apk-docker.yml'

jobs:
  build:
    name: Build Flutter APK (Docker)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          cd mobile_flutter
          docker build -f Dockerfile.android-build \
            -t amaw-pyay-flutter-builder:latest \
            .

      - name: Build Flutter APK
        run: |
          mkdir -p mobile_flutter/build/app/outputs/flutter-apk
          docker run --rm \
            -v ${{ github.workspace }}/mobile_flutter:/app \
            amaw-pyay-flutter-builder:latest \
            bash -c "cd /app && flutter build apk --release --target-platform android-arm64"

      - name: Generate APK checksum
        if: success()
        run: |
          if [ -f mobile_flutter/build/app/outputs/flutter-apk/app-release.apk ]; then
            sha256sum mobile_flutter/build/app/outputs/flutter-apk/app-release.apk > mobile_flutter/build/app/outputs/flutter-apk/app-release.apk.sha256
            cat mobile_flutter/build/app/outputs/flutter-apk/app-release.apk.sha256
          fi

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-docker
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload checksum as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-docker-checksum
          path: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk.sha256
          retention-days: 30

      - name: Create release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display build summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          if [ -f mobile_flutter/build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK Build Successful"
            ls -lh mobile_flutter/build/app/outputs/flutter-apk/app-release.apk
            cat mobile_flutter/build/app/outputs/flutter-apk/app-release.apk.sha256
          else
            echo "❌ APK Build Failed"
            find mobile_flutter/build -name "*.apk" 2>/dev/null || echo "No APK files found"
          fi
