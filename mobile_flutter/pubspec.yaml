name: amaw_pyay
description: "Ah-Maw-Pyay Water Delivery & Factory Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Routing
  go_router: ^12.0.0

  # Local Database (Offline-first)
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.8.0
  path_provider: ^2.1.0

  # HTTP Client
  dio: ^5.3.0
  retrofit: ^4.0.0

  # Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Dependency Injection
  get_it: ^7.6.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.0
  dartz: ^0.10.1
  equatable: ^2.0.5

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  connectivity_plus: ^5.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^16.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.13.0
  retrofit_generator: ^8.0.0

flutter:
  uses-material-design: true
